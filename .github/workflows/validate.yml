name: Validate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate data and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile builder
        run: python -m py_compile build_graph.py scripts/validate_repo.py scripts/audit_accessibility.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate repository data
        run: python scripts/validate_repo.py

      - name: Audit accessibility
        run: python scripts/audit_accessibility.py

      - name: Validate PR boundaries
        if: github.event_name == 'pull_request'
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/changed-files.txt
          python scripts/validate_repo.py --changed-files /tmp/changed-files.txt

      - name: Smoke rebuild
        run: python build_graph.py

      - name: Audit rebuilt accessibility
        run: python scripts/audit_accessibility.py
