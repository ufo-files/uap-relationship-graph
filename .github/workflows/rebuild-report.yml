name: Rebuild Report

on:
  push:
    branches:
      - main
    paths:
      - build_graph.py
      - data/reclass.json
      - data/transcripts/**
      - .github/workflows/rebuild-report.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild:
    name: Rebuild static graph
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate reclassification data
        run: python -m json.tool data/reclass.json > /dev/null

      - name: Compile builder and validator
        run: python -m py_compile build_graph.py scripts/validate_repo.py scripts/audit_accessibility.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate repository data
        run: python scripts/validate_repo.py

      - name: Audit accessibility
        run: python scripts/audit_accessibility.py

      - name: Rebuild graph
        run: python build_graph.py

      - name: Audit rebuilt accessibility
        run: python scripts/audit_accessibility.py

      - name: Commit rebuilt report
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app-data.js data/graph.json data/manifest.json data/reclass.json data/reclass-template.json data/entities.json data/mentions.json data/relationships.json data/segments.json
          git commit -m "Rebuild report from source data [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
