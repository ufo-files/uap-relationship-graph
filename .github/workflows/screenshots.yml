name: Screenshots

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - "app-data.js"
      - "app-data-mentions.js"
      - "app-data-relationships.js"
      - "data/**"
      - "scripts/capture_screenshots.js"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.js"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.UFO_FILES_WORKFLOW_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: npm run screenshots

      - name: Commit screenshots
        run: |
          if git diff --quiet -- screenshots; then
            echo "Screenshots are already current."
            exit 0
          fi
          git config user.name "ufo-files"
          git config user.email "297273897+ufo-files@users.noreply.github.com"
          git add screenshots
          git commit -m "Update relationship graph screenshots"
          git fetch origin "${{ github.ref_name }}"
          git rebase "origin/${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
