name: Restrict pull request authors

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  close-unauthorized-pr:
    if: github.event.pull_request.user.login != 'ufo-files'
    runs-on: ubuntu-latest
    steps:
      - name: Close pull requests from unauthorized authors
        uses: actions/github-script@v7
        with:
          script: |
            const pull = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pull.number;
            const author = pull.user.login;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: `Closing this pull request because this repository only accepts pull requests opened by ufo-files. This PR was opened by @${author}.`,
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              state: "closed",
            });
