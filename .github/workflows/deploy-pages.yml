name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - ".nojekyll"
      - "index.html"
      - "styles.css"
      - "app.js"
      - "app-data.js"
      - "app-data-mentions.js"
      - "app-data-relationships.js"
      - "data/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp .nojekyll index.html styles.css app.js app-data.js app-data-mentions.js app-data-relationships.js public/
          cp -R data public/data

      - name: Publish Pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.UFO_FILES_WORKFLOW_TOKEN || github.token }}
        run: |
          cd public
          git init
          git config user.name "ufo-files"
          git config user.email "297273897+ufo-files@users.noreply.github.com"
          git add -A
          git commit -m "Deploy relationship graph"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
