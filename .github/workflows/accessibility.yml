name: Accessibility

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - build_graph.py
      - index.html
      - app-data.js
      - package.json
      - package-lock.json
      - playwright.config.js
      - scripts/audit_accessibility.py
      - tests/accessibility.spec.js
      - .github/workflows/accessibility.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: accessibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  accessibility:
    name: Keyboard and screen reader smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Audit committed app accessibility
        run: python scripts/audit_accessibility.py

      - name: Rebuild graph
        run: python build_graph.py

      - name: Audit rebuilt app accessibility
        run: python scripts/audit_accessibility.py

      - name: Run browser accessibility tests
        run: npm run test:a11y
